<div class="min-h-screen flex" [class.dark]="isDark" style="background-color: var(--bg-base); color: var(--text-primary);">

  <!-- ── SIDEBAR ─────────────────────────────── -->
  <aside class="shrink-0 min-h-screen flex flex-col border-r transition-all duration-300 relative"
    [ngClass]="isSidebarMinimized ? 'w-[72px]' : 'w-56'"
    style="background: var(--bg-surface); border-color: var(--border);">

    <!-- Collapse Toggle -->
    <button (click)="toggleSidebar()"
      class="absolute -right-3.5 top-6 w-7 h-7 rounded-full flex items-center justify-center border shadow-md transition-all z-10 hover:scale-110"
      style="background: var(--bg-surface); border-color: var(--border); color: var(--text-secondary);">
      <svg class="w-3.5 h-3.5 transition-transform duration-300" 
           [class.rotate-180]="isSidebarMinimized" 
           fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
      </svg>
    </button>

    <!-- Logo -->
    <div class="h-14 px-5 flex items-center gap-3 border-b overflow-hidden" 
         [ngClass]="isSidebarMinimized ? 'justify-center px-0' : ''"
         style="border-color: var(--border-subtle);">
      <div class="w-7 h-7 rounded-lg flex items-center justify-center shrink-0"
        style="background: linear-gradient(135deg, #10b981, #059669); box-shadow: 0 2px 8px rgba(16,185,129,0.35);">
        <svg class="w-4 h-4 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2a10 10 0 0 0-6.88 17.22C6.54 17.82 8.16 18 10 18c2 0 3.5.5 5 2a8 8 0 0 0 4-7.48A10 10 0 0 0 12 2z"/>
          <path d="M12 12c-2-2-4-3-6-3"/>
          <path d="M12 12c2 0 4-1 6-3"/>
        </svg>
      </div>
      <div class="leading-none whitespace-nowrap transition-all duration-300" 
           [ngClass]="isSidebarMinimized ? 'opacity-0 w-0 hidden' : 'opacity-100'">
        <span class="block text-sm font-bold tracking-tight font-display" style="color: var(--text-primary);">GreenTech</span>
        <span class="block text-[9px] font-semibold uppercase tracking-[0.12em] mt-0.5" style="color: var(--text-tertiary);">DF Platform</span>
      </div>
    </div>

    <!-- Nav -->
    <nav class="flex-1 p-2.5 space-y-0.5 mt-1">

      <a routerLink="/analytics"
        routerLinkActive="sidebar-item-active"
        [title]="isSidebarMinimized ? 'Analytics' : ''"
        [routerLinkActiveOptions]="{exact: false}"
        class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all duration-200 group border-l-2 border-transparent hover:bg-black/[0.04] dark:hover:bg-white/[0.04]"
        [ngClass]="isSidebarMinimized ? 'justify-center mx-1' : ''"
        style="color: var(--text-secondary);">
        <svg class="w-4 h-4 shrink-0 transition-transform duration-200 group-hover:scale-110" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.75">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75C7.5 20.496 6.996 21 6.375 21h-2.25A1.125 1.125 0 013 19.875v-6.75zM9.75 8.625c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125v11.25c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V8.625zM16.5 4.125c0-.621.504-1.125 1.125-1.125h2.25C20.496 3 21 3.504 21 4.125v15.75c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V4.125z"/>
        </svg>
        <span *ngIf="!isSidebarMinimized" class="whitespace-nowrap transition-opacity">Analytics</span>
      </a>

      <a routerLink="/conteudo"
        routerLinkActive="sidebar-item-active"
        [title]="isSidebarMinimized ? 'Conteúdo' : ''"
        [routerLinkActiveOptions]="{exact: false}"
        class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all duration-200 group border-l-2 border-transparent hover:bg-black/[0.04] dark:hover:bg-white/[0.04]"
        [ngClass]="isSidebarMinimized ? 'justify-center mx-1' : ''"
        style="color: var(--text-secondary);">
        <svg class="w-4 h-4 shrink-0 transition-transform duration-200 group-hover:scale-110" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.75">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 12h16.5m-16.5 3.75h16.5M3.75 19.5h16.5M5.625 4.5h12.75a1.875 1.875 0 010 3.75H5.625a1.875 1.875 0 010-3.75z"/>
        </svg>
        <span *ngIf="!isSidebarMinimized" class="whitespace-nowrap transition-opacity">Conteúdo</span>
      </a>

    </nav>

    <!-- Bottom Controls -->
    <div class="p-3 space-y-2 border-t" style="border-color: var(--border-subtle);">

      <!-- Theme Toggle -->
      <button (click)="toggleDarkMode()"
        class="w-full flex items-center justify-between px-3 py-2.5 rounded-xl text-xs font-semibold transition-all duration-200 group"
        style="background: var(--bg-elevated); border: 1px solid var(--border); color: var(--text-secondary);">
        <span class="flex items-center gap-2.5">
          <svg *ngIf="isDark" class="w-3.5 h-3.5 text-amber-400 group-hover:rotate-12 transition-transform" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd" d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" clip-rule="evenodd"/>
          </svg>
          <svg *ngIf="!isDark" class="w-3.5 h-3.5 text-indigo-400 group-hover:-rotate-12 transition-transform" fill="currentColor" viewBox="0 0 20 20">
            <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/>
          </svg>
          <span *ngIf="!isSidebarMinimized" class="uppercase tracking-wider text-[10px] whitespace-nowrap">{{ isDark ? 'Modo Claro' : 'Modo Escuro' }}</span>
        </span>
        <!-- Toggle pill -->
        <div class="relative w-7 h-4 rounded-full transition-colors duration-300"
          [class]="isDark ? 'bg-emerald-500/30' : 'bg-gray-200'">
          <div class="absolute top-0.5 w-3 h-3 rounded-full shadow-sm transition-all duration-300"
            [class]="isDark ? 'right-0.5 bg-emerald-400' : 'left-0.5 bg-white'"></div>
        </div>
      </button>

      <!-- User -->
      <div class="flex items-center gap-2.5 rounded-xl transition-all" 
           [ngClass]="isSidebarMinimized ? 'justify-center p-0 bg-transparent' : 'px-3 py-2.5'"
           [style.background]="!isSidebarMinimized ? 'var(--bg-elevated)' : ''">
        <div class="w-7 h-7 rounded-lg flex items-center justify-center shrink-0 text-white text-xs font-bold"
          style="background: linear-gradient(135deg, #059669, #0d9488);">
          G
        </div>
        <div *ngIf="!isSidebarMinimized" class="overflow-hidden flex-1 min-w-0">
          <p class="text-xs font-semibold truncate" style="color: var(--text-primary);">GreenTech Admin</p>
          <p class="text-[9px] font-medium uppercase tracking-widest truncate" style="color: var(--text-tertiary);">Gestor Territorial</p>
        </div>
      </div>

    </div>
  </aside>

  <!-- ── MAIN CONTENT ──────────────────────── -->
  <main class="flex-1 h-screen overflow-hidden transition-colors duration-500" style="background: var(--bg-base);">
    <router-outlet></router-outlet>
  </main>

</div>

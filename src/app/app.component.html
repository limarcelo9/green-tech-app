<div class="min-h-screen bg-gray-50 dark:bg-gray-950 flex transition-colors duration-300">
  <!-- Sidebar -->
  <aside
    class="w-64 bg-green-50 dark:bg-gray-950 text-gray-900 dark:text-white min-h-screen flex flex-col shadow-xl dark:shadow-none border-r border-green-100 dark:border-gray-800 transition-all duration-300">
    <div class="p-6">
      <h1 class="text-2xl font-black tracking-tight text-green-800 dark:text-green-400 font-outfit">GreenTech</h1>
      <p class="text-green-700 dark:text-green-500/80 text-[10px] font-bold uppercase tracking-widest mt-1">Sustainability App</p>
    </div>

    <nav class="flex-1 px-4 space-y-1.5 mt-4">
      <a routerLink="/analytics" routerLinkActive="bg-green-600 text-white shadow-lg shadow-green-600/20"
        class="flex items-center px-4 py-2.5 text-green-900 dark:text-green-100 hover:bg-green-100 dark:hover:bg-gray-800 rounded-xl transition-all font-semibold text-sm group">
        <svg class="w-5 h-5 mr-3 text-green-600 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z">
          </path>
        </svg>
        Analytics
      </a>
    </nav>

    <!-- Dark Mode Toggle -->
    <div class="px-4 pb-4">
      <button (click)="toggleDarkMode()"
        class="w-full flex items-center justify-between px-4 py-3 rounded-xl bg-white dark:bg-gray-900 border border-green-200 dark:border-gray-800 text-green-900 dark:text-green-100 hover:shadow-md transition-all group">
        <span class="flex items-center text-xs font-bold uppercase tracking-wider">
          <svg *ngIf="!isDark" class="w-5 h-5 mr-3 text-amber-500 group-hover:rotate-12 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
          </svg>
          <svg *ngIf="isDark" class="w-5 h-5 mr-3 text-yellow-400 group-hover:rotate-45 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z">
            </path>
          </svg>
          {{ isDark ? 'Modo Claro' : 'Modo Escuro' }}
        </span>
        <div class="w-8 h-4 rounded-full transition-colors duration-300 relative bg-gray-200 dark:bg-green-900/40">
          <div class="w-3 h-3 bg-white rounded-full shadow-sm absolute top-0.5 transition-all duration-300"
            [class.right-0.5]="isDark" [class.left-0.5]="!isDark"></div>
        </div>
      </button>
    </div>

    <div class="p-4 border-t border-green-100 dark:border-gray-800">
      <div class="flex items-center text-sm">
        <div class="w-9 h-9 bg-green-600 dark:bg-green-700 rounded-xl flex items-center justify-center mr-3 shadow-lg shadow-green-600/20">
          <span class="text-white font-black">U</span>
        </div>
        <div class="overflow-hidden">
          <p class="text-gray-900 dark:text-white font-bold truncate">User Admin</p>
          <p class="text-green-600 dark:text-green-500 text-[10px] font-black uppercase">Administrator</p>
        </div>
      </div>
    </div>

  </aside>

  <!-- Main Content Area -->
  <main class="flex-1 p-8 dark:bg-gray-950 transition-colors duration-300">
    <router-outlet></router-outlet>
  </main>
</div>
